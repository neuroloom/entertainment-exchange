name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: entx
          POSTGRES_PASSWORD: entx_secret
          POSTGRES_DB: entertainment_exchange_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Type check
        run: npx tsc --noEmit
        working-directory: apps/api
      - name: Tests
        run: npx vitest run
        env:
          DATABASE_URL: postgres://entx:entx_secret@localhost:5432/entertainment_exchange_test
      - name: Build
        run: npm run build
  docker:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t entertainment-exchange .
